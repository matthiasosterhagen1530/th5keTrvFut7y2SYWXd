name: Auto Restart Workflow

permissions:
  actions: write

on:
  schedule:
    - cron: '*/15 * * * *'   # هر ۱۵ دقیقه
  push:
  workflow_dispatch: 

jobs:
  restart:
    runs-on: ubuntu-latest
    steps:
      - name: Restart Main Tunnel Workflow
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.PAT_WORKFLOW }}" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/LinuxServer_Tun.yml/dispatches \
            -d '{"ref":"main"}'
