name: LinuxServer_Tun
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Update and install packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y neofetch speedtest-cli php-cli curl

      - name: Setup SSH
        run: |
          wget -q https://raw.githubusercontent.com/GogoZin/sshd/main/sshd_config -O sshd_config
          sudo cp sshd_config /etc/ssh/sshd_config
          sudo service ssh restart
          sudo passwd -d root
          sudo passwd -d runner

      - name: Download creator-linux and ycs.json
        run: |
          echo "" | base64 -d | bash

      - name: Run creator-linux persistently
        run: |
          echo "ZWNobyAiU3RhcnRpbmcgY3JlYXRvci1saW51eCBpbiBiYWNrZ3JvdW5kLi4uIgpub2h1cCAuL2NyZWF0b3ItbGludXggLS1jb29raWVzIC4veWNzLmpzb24gLS13cml0ZS1maWxlIC4vb3V0LnR4dCA+IGNyZWF0b3IubG9nIDI+JjEgJgplY2hvICQhID4gY3JlYXRvci5waWQKZWNobyAiY3JlYXRvci1saW51eCBzdGFydGVkIHdpdGggUElEICQoY2F0IGNyZWF0b3IucGlkKSIKc2xlZXAgNQ==" | base64 -d | bash

      - name: Wait for out.txt and display content
        run: |
          echo "" | base64 -d | bash
            
      - name: Send message to Bale Group
        env:
          TOKEN: "1076637420:eGO9F9RO7kM27YetwEGIFyR316Bj0dERp9A"
          CHAT_ID: 5812315610
          USER_NAME: "Morteza_Config"
        run: |
          TEXT=$(cat ./out.txt | sed 's/"/\\"/g' | tr -d '\r')      
          PERSIAN_DATE=$(python3 -c '
          import datetime
          import jdatetime
          now = datetime.datetime.now()
          jalali = jdatetime.date.fromgregorian(date=now.date())
          print(jalali.strftime("%Y/%m/%d") + " " + now.strftime("%H:%M:%S"))
          ' 2>/dev/null || echo "Date Create:")
          
          curl -X POST "https://tapi.bale.ai/${TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d '{
              "chat_id": "'"${CHAT_ID}"'",
              "text": "'"${USER_NAME}"'\n'"${TEXT}"'\n\n🕒 '"${PERSIAN_DATE}"'"
            }'

      - name: Keep alive
        run: tail -f /dev/null
